<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Маршрут — заправки, кафе, туалеты, места</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  :root{
    --bg:#fff; --panel:#f4f4f2; --text:#1c1c1a; --muted:#6b6b66;
    --border:#e2e2dd; --accent:#2f6fd6;
    --cafe:#d8732e; --fuel:#1d9e75; --toilet:#534ab7; --tour:#d4537e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);}
  #app{display:flex;flex-direction:column;height:100vh;}
  #controls{padding:10px 12px;background:var(--bg);border-bottom:1px solid var(--border);z-index:1000;max-height:48vh;overflow-y:auto;}
  .pt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dot.start{background:var(--fuel);} .dot.via{background:#bbb;} .dot.end{background:var(--cafe);}
  .pt-row input{flex:1;min-width:0;padding:9px 10px;font-size:15px;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);}
  .pt-row input:focus{outline:none;border-color:var(--accent);}
  .icon-btn{width:34px;height:34px;border:none;border-radius:8px;background:var(--panel);color:var(--muted);font-size:18px;cursor:pointer;flex-shrink:0;}
  .mini-actions{display:flex;gap:8px;margin-bottom:6px;}
  .mini-actions button{flex:1;font-size:13px;color:var(--accent);background:var(--panel);border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:7px 0;}
  #buildBtn{width:100%;padding:11px;font-size:15px;font-weight:500;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;}
  #buildBtn:active{opacity:.85;} #buildBtn:disabled{opacity:.5;}
  #routeChoices{display:none;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .route-card{flex:1;min-width:90px;padding:8px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;background:var(--panel);cursor:pointer;text-align:center;}
  .route-card.active{border-color:var(--accent);background:#eaf1fb;}
  .route-card b{display:block;font-size:14px;}
  #panelBottom{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 12px;display:none;}
  #radiusRow{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);margin-bottom:8px;}
  #radiusRow input[type=range]{flex:1;}
  #radiusVal{min-width:60px;text-align:right;color:var(--text);font-weight:500;}
  #filters{display:flex;gap:6px;}
  .filter{flex:1;padding:8px 2px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:var(--panel);color:var(--text);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .filter .em{font-size:17px;line-height:1;}
  .filter.active.cafe{background:var(--cafe);color:#fff;border-color:var(--cafe);}
  .filter.active.fuel{background:var(--fuel);color:#fff;border-color:var(--fuel);}
  .filter.active.toilet{background:var(--toilet);color:#fff;border-color:var(--toilet);}
  .filter.active.tourism{background:var(--tour);color:#fff;border-color:var(--tour);}
  #map{flex:1;width:100%;}
  #status{padding:8px 12px;font-size:13px;color:var(--muted);background:var(--bg);border-top:1px solid var(--border);text-align:center;min-height:34px;}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .leaflet-popup-content{font-size:13px;margin:8px 10px;line-height:1.5;}
  .leaflet-popup-content a{color:var(--accent);text-decoration:none;font-weight:500;}
</style>
</head>
<body>
<div id="app">
  <div id="controls">
    <div class="pt-row"><span class="dot start"></span><input id="ptStart" type="text" placeholder="Откуда" autocomplete="off"></div>
    <div id="viaContainer"></div>
    <div class="pt-row"><span class="dot end"></span><input id="ptEnd" type="text" placeholder="Куда" autocomplete="off"></div>
    <div class="mini-actions">
      <button id="addVia">+ промежуточная</button>
      <button id="geoBtn">📍 моё место как старт</button>
    </div>
    <button id="buildBtn">Построить маршруты</button>
    <div id="routeChoices"></div>
  </div>

  <div id="panelBottom">
    <div id="radiusRow">
      <span>Радиус для «Мест»</span>
      <input id="radius" type="range" min="1" max="10" value="3" step="1">
      <span id="radiusVal">3 км</span>
    </div>
    <div id="filters">
      <button class="filter cafe" data-type="cafe"><span class="em">☕</span>Кафе</button>
      <button class="filter fuel" data-type="fuel"><span class="em">⛽</span>Заправки</button>
      <button class="filter toilet" data-type="toilet"><span class="em">🚻</span>Туалеты</button>
      <button class="filter tourism" data-type="tourism"><span class="em">🏛️</span>Места</button>
    </div>
  </div>

  <div id="map"></div>
  <div id="status">Введите точки и нажмите «Построить маршруты»</div>
</div>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg){ tg.ready(); tg.expand(); }
if (typeof L === 'undefined'){
  document.getElementById('status').textContent='Не загрузилась библиотека карты. Откройте через локальный сервер или хостинг.';
  throw new Error('Leaflet not loaded');
}

const map = L.map('map').setView([55.75,37.62],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const statusEl=document.getElementById('status');
function setStatus(h,l=false){ statusEl.innerHTML=(l?'<span class="spinner"></span>':'')+h; }

let allRoutes=[], routeLines=[], chosenIndex=0, chosenCoords=[];
let poiLayers={cafe:null,fuel:null,toilet:null,tourism:null};
let meMarker=null;

// несколько Overpass-зеркал: если одно перегружено, пробуем следующее
const OVERPASS_SERVERS=[
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
  'https://maps.mail.ru/osm/tools/overpass/api/interpreter'
];

async function fetchJSON(url,opts){
  const r=await fetch(url,opts);
  const text=await r.text();
  try{ return JSON.parse(text); }
  catch(e){ throw new Error('сервис вернул не JSON (перегружен/недоступен)'); }
}

// Overpass с перебором зеркал
async function overpassQuery(q){
  let lastErr;
  for(const server of OVERPASS_SERVERS){
    try{
      const r=await fetch(server,{method:'POST',body:'data='+encodeURIComponent(q)});
      const text=await r.text();
      try{ return JSON.parse(text); }
      catch(e){ lastErr=new Error('сервер перегружен'); continue; }
    }catch(e){ lastErr=e; continue; }
  }
  throw lastErr||new Error('все серверы недоступны');
}

async function geocode(query){
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(query);
  const data=await fetchJSON(url,{headers:{'Accept-Language':'ru'}});
  if(!data.length) throw new Error('Не найдено: '+query);
  return [parseFloat(data[0].lat),parseFloat(data[0].lon)];
}

document.getElementById('addVia').addEventListener('click',()=>{
  const row=document.createElement('div'); row.className='pt-row';
  row.innerHTML='<span class="dot via"></span><input type="text" class="via-input" placeholder="Промежуточная точка" autocomplete="off"><button class="icon-btn">✕</button>';
  row.querySelector('.icon-btn').onclick=()=>row.remove();
  document.getElementById('viaContainer').appendChild(row);
});

document.getElementById('geoBtn').addEventListener('click',()=>{
  if(!navigator.geolocation){ setStatus('Геолокация не поддерживается'); return; }
  setStatus('Определяю местоположение…',true);
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat,longitude:lon}=pos.coords;
    document.getElementById('ptStart').value=lat.toFixed(5)+', '+lon.toFixed(5);
    if(meMarker) map.removeLayer(meMarker);
    meMarker=L.marker([lat,lon]).addTo(map).bindPopup('Вы здесь').openPopup();
    map.setView([lat,lon],12);
    setStatus('Местоположение задано как старт');
  }, err=> setStatus('Не удалось определить: '+err.message));
});

async function resolvePoint(str){
  const m=str.match(/^\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*$/);
  if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  return await geocode(str);
}

document.getElementById('buildBtn').addEventListener('click', async ()=>{
  const startQ=document.getElementById('ptStart').value.trim();
  const endQ=document.getElementById('ptEnd').value.trim();
  if(!startQ||!endQ){ setStatus('Заполните «Откуда» и «Куда»'); return; }
  setStatus('Ищу координаты…',true);
  try{
    const points=[await resolvePoint(startQ)];
    for(const inp of document.querySelectorAll('.via-input'))
      if(inp.value.trim()) points.push(await resolvePoint(inp.value.trim()));
    points.push(await resolvePoint(endQ));
    setStatus('Строю маршруты…',true);
    const coordStr=points.map(p=>p[1]+','+p[0]).join(';');
    const url='https://router.project-osrm.org/route/v1/driving/'+coordStr+'?overview=full&geometries=geojson&alternatives=true';
    const data=await fetchJSON(url);
    if(data.code!=='Ok') throw new Error('Маршрут не построен');
    allRoutes=data.routes;
    drawRouteChoices(points);
  }catch(e){ setStatus('Ошибка: '+e.message); }
});

function drawRouteChoices(points){
  routeLines.forEach(l=>map.removeLayer(l)); routeLines=[];
  clearAllPOI();
  const el=document.getElementById('routeChoices'); el.innerHTML=''; el.style.display='flex';
  allRoutes.forEach((rt,i)=>{
    const coords=rt.geometry.coordinates.map(c=>[c[1],c[0]]);
    const line=L.polyline(coords,{color:'#9aa0a6',weight:5,opacity:.6}).addTo(map);
    line.on('click',()=>selectRoute(i,points)); routeLines.push(line);
    const km=(rt.distance/1000).toFixed(0), min=Math.round(rt.duration/60), h=Math.floor(min/60), m=min%60;
    const card=document.createElement('div'); card.className='route-card'+(i===0?' active':'');
    card.innerHTML='<b>'+km+' км</b>'+(h?h+' ч ':'')+m+' мин';
    card.onclick=()=>selectRoute(i,points); el.appendChild(card);
  });
  selectRoute(0,points);
  setStatus(allRoutes.length>1?'Выберите маршрут, затем включите фильтры':'Маршрут построен. Включите фильтры');
}

function selectRoute(idx,points){
  chosenIndex=idx;
  chosenCoords=allRoutes[idx].geometry.coordinates.map(c=>[c[1],c[0]]);
  routeLines.forEach((l,i)=>l.setStyle({color:i===idx?'#2f6fd6':'#9aa0a6',opacity:i===idx?.9:.5,weight:i===idx?6:4}));
  routeLines[idx].bringToFront();
  document.querySelectorAll('.route-card').forEach((c,i)=>c.classList.toggle('active',i===idx));
  if(window._startM) map.removeLayer(window._startM);
  if(window._endM) map.removeLayer(window._endM);
  window._startM=L.marker(points[0]).addTo(map).bindPopup('Старт');
  window._endM=L.marker(points[points.length-1]).addTo(map).bindPopup('Финиш');
  map.fitBounds(routeLines[idx].getBounds(),{padding:[30,30]});
  document.getElementById('panelBottom').style.display='block';
  refreshActivePOI();
}

// ---- POI ----
const POI_QUERY={
  cafe:   'nwr["amenity"="cafe"]',
  fuel:   'nwr["amenity"="fuel"]',
  toilet: 'nwr["amenity"="toilets"]',
  tourism:'nwr["tourism"~"attraction|museum|viewpoint|artwork"]'
};
const POI_COLOR={cafe:'#d8732e',fuel:'#1d9e75',toilet:'#534ab7',tourism:'#d4537e'};
const POI_EMOJI={cafe:'☕',fuel:'⛽',toilet:'🚻',tourism:'🏛️'};
const POI_NAME ={cafe:'Кафе',fuel:'Заправка',toilet:'Туалет',tourism:'Достопримечательность'};
// коридор вдоль дороги (метры): кафе/заправки/туалеты — фиксированный, узкий
const CORRIDOR={cafe:300, fuel:500, toilet:300};

function sampledRoute(maxPts){
  if(chosenCoords.length<=maxPts) return chosenCoords;
  const step=Math.ceil(chosenCoords.length/maxPts);
  const out=[]; for(let i=0;i<chosenCoords.length;i+=step) out.push(chosenCoords[i]);
  return out;
}
function yandexLink(lat,lon,name){
  return 'https://yandex.ru/maps/?pt='+lon+','+lat+'&z=17&l=map&text='+encodeURIComponent(name||'');
}

// бьём точки маршрута на чанки и шлём отдельные запросы — так Overpass не давится
function chunk(arr,size){ const out=[]; for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size)); return out; }

async function loadPOI(type){
  if(!chosenCoords.length){ setStatus('Сначала постройте и выберите маршрут'); return; }
  const radius = type==='tourism' ? parseInt(document.getElementById('radius').value,10)*1000 : CORRIDOR[type];
  const label = type==='tourism' ? ' в радиусе '+(radius/1000)+' км' : ' вдоль дороги';
  setStatus('Ищу: '+POI_NAME[type].toLowerCase()+label+'…',true);

  const pts=sampledRoute(60);
  const chunks=chunk(pts, 20);  // по 20 точек на запрос
  const group=L.layerGroup(); let count=0; const seen=new Set();

  try{
    for(let ci=0; ci<chunks.length; ci++){
      const around=chunks[ci].map(p=>p[0]+','+p[1]).join(',');
      const q='[out:json][timeout:25];('+POI_QUERY[type]+'(around:'+radius+','+around+'););out center 80;';
      const data=await overpassQuery(q);
      for(const el of (data.elements||[])){
        const lat=el.lat||(el.center&&el.center.lat);
        const lon=el.lon||(el.center&&el.center.lon);
        if(lat==null||lon==null) continue;
        const key=lat.toFixed(5)+','+lon.toFixed(5);
        if(seen.has(key)) continue; seen.add(key);
        const name=(el.tags&&(el.tags.name||el.tags.brand))||POI_NAME[type];
        const popup='<b>'+POI_EMOJI[type]+' '+name+'</b><br><a href="'+yandexLink(lat,lon,name)+'" target="_blank" rel="noopener">Открыть в Яндекс.Картах →</a>';
        L.circleMarker([lat,lon],{radius:6,color:'#fff',weight:1.5,fillColor:POI_COLOR[type],fillOpacity:1}).bindPopup(popup).addTo(group);
        count++;
      }
      setStatus('Загружаю '+POI_NAME[type].toLowerCase()+'… ('+(ci+1)+'/'+chunks.length+', найдено '+count+')',true);
    }
    group.addTo(map);
    poiLayers[type]=group;
    setStatus('Найдено '+count+' · '+POI_NAME[type].toLowerCase()+label);
  }catch(e){
    document.querySelector('.filter[data-type="'+type+'"]').classList.remove('active');
    if(poiLayers[type]){ map.removeLayer(poiLayers[type]); poiLayers[type]=null; }
    group.addTo(map); poiLayers[type]=group; // показать что успели найти
    setStatus('Часть точек не загрузилась ('+e.message+'). Показано: '+count);
  }
}

function clearAllPOI(){
  for(const t in poiLayers){ if(poiLayers[t]){ map.removeLayer(poiLayers[t]); poiLayers[t]=null; } }
  document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));
}
async function refreshActivePOI(){
  const active=[...document.querySelectorAll('.filter.active')].map(f=>f.dataset.type);
  for(const t of active){ if(poiLayers[t]){ map.removeLayer(poiLayers[t]); poiLayers[t]=null; } }
  for(const t of active){ await loadPOI(t); }
}

document.querySelectorAll('.filter').forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    const type=btn.dataset.type;
    if(btn.classList.contains('active')){
      btn.classList.remove('active');
      if(poiLayers[type]){ map.removeLayer(poiLayers[type]); poiLayers[type]=null; }
      setStatus('Фильтр выключен');
    }else{
      btn.classList.add('active');
      await loadPOI(type);
    }
  });
});

const radiusInput=document.getElementById('radius');
radiusInput.addEventListener('input',()=> document.getElementById('radiusVal').textContent=radiusInput.value+' км');
radiusInput.addEventListener('change',()=>{
  // радиус влияет только на туристические места
  if(document.querySelector('.filter[data-type="tourism"]').classList.contains('active')){
    if(poiLayers.tourism){ map.removeLayer(poiLayers.tourism); poiLayers.tourism=null; }
    loadPOI('tourism');
  }
});
</script>
</body>
</html>
